<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моя Волшебная Книга</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a1a2e;
            touch-action: none; /* Оставляем только свайпы для книги */
        }

        .flip-book { box-shadow: 0 0 20px rgba(0, 0, 0, 0.8); }
        .page {
            background-color: #fff; border: solid 1px #e8e8e8;
            overflow: hidden; position: relative;
            background-size: cover; background-position: center;
        }
        .page.--left { border-right: 0; box-shadow: inset -7px 0 30px -7px rgba(0, 0, 0, 0.4); }
        .page.--right { border-left: 0; box-shadow: inset 7px 0 30px -7px rgba(0, 0, 0, 0.4); }

        #loading-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; transition: opacity 0.5s ease-out; background: #1a1a2e;
        }
    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-white mb-4"></div>
        <p class="text-white text-lg font-semibold">Открываем книгу...</p>
    </div>

    <!-- Контейнер для книги -->
    <div class="absolute inset-0 flex justify-center items-center opacity-0 transition-opacity duration-1000" id="book-container">
        <div class="flip-book" id="flip-book"></div>
    </div>

    <script>
        // ТВОЯ ССЫЛКА НА КНИГУ ЗДЕСЬ
        const PDF_URL = './book.pdf'; 

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function initBook() {
            const flipBookDiv = document.getElementById('flip-book');
            const loadingScreen = document.getElementById('loading-screen');
            const bookContainer = document.getElementById('book-container');

            try {
                // Загружаем PDF с дополнительными настройками стабильности
                const loadingTask = pdfjsLib.getDocument({
                    url: PDF_URL,
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
                    cMapPacked: true
                });
                const pdf = await loadingTask.promise;
                const numPages = pdf.numPages;

                // Превращаем страницы в картинки
                for (let i = 1; i <= numPages; i++) {
                    const page = await pdf.getPage(i);
                    
                    // ЖЕСТКО ограничиваем размер холста!
                    // Иначе телефон сойдет с ума от нехватки памяти при отрисовке скана.
                    const viewportOriginal = page.getViewport({ scale: 1.0 }); 
                    const MAX_WIDTH = 800; // Безопасная ширина для мобилок
                    const safeScale = Math.min(1.5, MAX_WIDTH / viewportOriginal.width);
                    const viewport = page.getViewport({ scale: safeScale });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    // ВАЖНО 1: Заливаем фон белым, чтобы спасти прозрачные PDF
                    context.fillStyle = '#ffffff';
                    context.fillRect(0, 0, canvas.width, canvas.height);

                    // Рисуем PDF
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    
                    // ВАЖНО 2: Вставляем холст напрямую! Никаких base64-кодировок, убивающих память.
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                    canvas.style.objectFit = 'contain'; // Картинка не обрежется, а впишется в страницу
                    pageDiv.appendChild(canvas);

                    flipBookDiv.appendChild(pageDiv);
                }

                // Делаем четное количество страниц (для 3D-эффекта)
                if (numPages % 2 !== 0) {
                    const emptyPage = document.createElement('div');
                    emptyPage.className = 'page';
                    emptyPage.style.backgroundColor = '#ffffff'; // Белая пустая страница
                    flipBookDiv.appendChild(emptyPage);
                }

                // Запускаем 3D-перелистывание
                const pageFlip = new St.PageFlip(flipBookDiv, {
                    width: 350, height: 500, size: "stretch",
                    minWidth: 250, maxWidth: 500, minHeight: 350, maxHeight: 700,
                    showCover: true, mobileScrollSupport: false
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));

                // Прячем загрузку, показываем книгу
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    bookContainer.style.opacity = '1';
                }, 500);

            } catch (error) {
                console.error(error);
                loadingScreen.innerHTML = '<p class="text-red-400">Ой, не удалось загрузить PDF :( Проверь название файла.</p>';
            }
        }

        // Запускаем магию!
        initBook();
    </script>
</body>
</html>
