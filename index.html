<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mini App Reader</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg-1: #06080d;
      --bg-2: #111827;
      --panel: rgba(8, 12, 20, 0.72);
      --text: #f4f7ff;
      --text-muted: #b8c3d9;
      --accent: #5ea2ff;
      --btn: rgba(94, 162, 255, 0.18);
      --btn-border: rgba(94, 162, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(120% 90% at 15% 10%, #1b2942 0%, transparent 50%),
        radial-gradient(110% 80% at 90% 90%, #1a1333 0%, transparent 52%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
      font-family: "SF Pro Display", "Segoe UI", "Helvetica Neue", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
      touch-action: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background:
        radial-gradient(120% 100% at 50% 10%, #213050 0%, transparent 55%),
        linear-gradient(160deg, #0d1220, #06080d);
    }

    #rotatePrompt {
      z-index: 60;
      gap: 12px;
    }

    .phone-icon {
      width: 70px;
      height: 70px;
      opacity: 0.92;
      animation: rotatePhone 1.8s ease-in-out infinite;
    }

    @keyframes rotatePhone {
      0% { transform: rotate(0deg); }
      40% { transform: rotate(-90deg); }
      100% { transform: rotate(-90deg); }
    }

    #rotatePrompt h1 {
      margin: 0;
      font-size: clamp(22px, 5vw, 34px);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    #rotatePrompt p {
      margin: 0;
      max-width: 480px;
      font-size: clamp(14px, 2.8vw, 18px);
      color: var(--text-muted);
      line-height: 1.4;
    }

    #loadingOverlay {
      z-index: 50;
      gap: 12px;
      transition: opacity 0.2s ease;
    }

    .spinner {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.18);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loadingText {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(14px, 2.8vw, 18px);
    }

    #errorBox {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: min(92vw, 680px);
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 111, 111, 0.45);
      background: rgba(91, 20, 20, 0.86);
      color: #ffe4e4;
      z-index: 80;
      font-size: 14px;
      line-height: 1.4;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 10px;
      padding: max(env(safe-area-inset-top), 10px) 10px max(env(safe-area-inset-bottom), 10px);
    }

    #stage {
      position: relative;
      min-height: 0;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 14px 42px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: ew-resize;
    }

    .sheet {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      will-change: transform, opacity;
      transition: transform 0.28s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.22s ease;
    }

    .sheet canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 20px 34px rgba(0, 0, 0, 0.4);
    }

    #incomingSheet {
      opacity: 0;
      pointer-events: none;
      transform: translateX(0);
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn {
      appearance: none;
      border: 1px solid var(--btn-border);
      background: var(--btn);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      padding: 10px 14px;
      border-radius: 10px;
      min-width: 100px;
    }

    .btn:disabled {
      opacity: 0.4;
    }

    #pageInfo {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 0.01em;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 0 6px;
    }

    @media (max-width: 820px) {
      .btn {
        min-width: 88px;
        padding: 10px 12px;
      }

      .sheet {
        padding: 10px;
      }
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <section id="rotatePrompt" class="overlay">
    <svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
      <rect x="7" y="2.5" width="10" height="19" rx="2"></rect>
      <circle cx="12" cy="18.2" r="0.7"></circle>
      <path d="M3.8 9.8A8.2 8.2 0 0 1 20.2 9.8"></path>
    </svg>
    <h1>Поверните устройство</h1>
    <p>Книга сверстана под разворот. Откройте мини-апп в горизонтальном режиме для комфортного чтения.</p>
  </section>

  <section id="loadingOverlay" class="overlay">
    <div class="spinner" aria-hidden="true"></div>
    <p id="loadingText">Загружаем PDF…</p>
  </section>

  <main id="app" hidden>
    <section id="stage" aria-label="Книга">
      <div id="currentSheet" class="sheet">
        <canvas id="currentCanvas"></canvas>
      </div>
      <div id="incomingSheet" class="sheet">
        <canvas id="incomingCanvas"></canvas>
      </div>
    </section>

    <nav class="controls" aria-label="Навигация">
      <button id="prevBtn" class="btn" type="button">Назад</button>
      <div id="pageInfo">Разворот 0 / 0</div>
      <button id="nextBtn" class="btn" type="button">Вперёд</button>
    </nav>
  </main>

  <div id="errorBox" hidden></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const rotatePrompt = document.getElementById("rotatePrompt");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingText = document.getElementById("loadingText");
    const errorBox = document.getElementById("errorBox");
    const app = document.getElementById("app");
    const stage = document.getElementById("stage");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageInfo = document.getElementById("pageInfo");
    const currentSheet = document.getElementById("currentSheet");
    const incomingSheet = document.getElementById("incomingSheet");
    const currentCanvas = document.getElementById("currentCanvas");
    const incomingCanvas = document.getElementById("incomingCanvas");

    const state = {
      pdf: null,
      spreads: [],
      isSourceLandscape: true,
      currentSpread: 1,
      layoutKey: "",
      cache: new Map(),
      cacheOrder: [],
      busy: false,
      queuedDelta: 0
    };

    function initTelegram() {
      if (!window.Telegram || !window.Telegram.WebApp) {
        return;
      }

      const tg = window.Telegram.WebApp;

      try {
        tg.ready();
        tg.expand();
        if (typeof tg.disableVerticalSwipes === "function") {
          tg.disableVerticalSwipes();
        }
        if (typeof tg.enableClosingConfirmation === "function") {
          tg.enableClosingConfirmation();
        } else {
          tg.isClosingConfirmationEnabled = true;
        }
        if (typeof tg.setHeaderColor === "function") {
          tg.setHeaderColor("#0b1020");
        }
        if (typeof tg.setBackgroundColor === "function") {
          tg.setBackgroundColor("#06080d");
        }
      } catch (_err) {
        // Telegram API optional in browser preview.
      }
    }

    function setLoading(text) {
      loadingText.textContent = text;
    }

    function showError(text) {
      errorBox.textContent = text;
      errorBox.hidden = false;
    }

    function clearError() {
      errorBox.hidden = true;
      errorBox.textContent = "";
    }

    function isLandscapeViewport() {
      return window.innerWidth > window.innerHeight;
    }

    function updateOrientationUI() {
      const landscape = isLandscapeViewport();
      rotatePrompt.hidden = landscape;
      app.hidden = !landscape || !state.pdf;
    }

    function getPdfPath() {
      const fromQuery = new URLSearchParams(window.location.search).get("pdf");
      const fileName = (fromQuery || "book.pdf").trim();
      const cleanName = fileName.replace(/^\/+/, "");
      return `./${cleanName}`;
    }

    async function detectSpreadMode(pdf) {
      const sampleNumber = pdf.numPages > 1 ? 2 : 1;
      const sample = await pdf.getPage(sampleNumber);
      const viewport = sample.getViewport({ scale: 1 });
      return viewport.width >= viewport.height;
    }

    function buildSpreads(totalPages, sourceLandscape) {
      const spreads = [];

      if (sourceLandscape) {
        for (let i = 1; i <= totalPages; i += 1) {
          spreads.push([i]);
        }
      } else {
        for (let i = 1; i <= totalPages; i += 2) {
          spreads.push([i, i + 1 <= totalPages ? i + 1 : null]);
        }
      }

      return spreads;
    }

    function getLayoutKey() {
      const rect = stage.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      return `${Math.round(rect.width)}x${Math.round(rect.height)}@${dpr}`;
    }

    function bumpCacheKey(key) {
      const index = state.cacheOrder.indexOf(key);
      if (index !== -1) {
        state.cacheOrder.splice(index, 1);
      }
      state.cacheOrder.push(key);
    }

    function trimCache(limit = 8) {
      while (state.cacheOrder.length > limit) {
        const oldest = state.cacheOrder.shift();
        state.cache.delete(oldest);
      }
    }

    function drawCanvas(target, source) {
      const ctx = target.getContext("2d", { alpha: false });
      target.width = source.width;
      target.height = source.height;
      target.style.width = `${source.dataset.dw}px`;
      target.style.height = `${source.dataset.dh}px`;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, target.width, target.height);
      ctx.drawImage(source, 0, 0);
    }

    async function renderPdfPage(pageNumber, scale) {
      const page = await state.pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });

      canvas.width = Math.max(1, Math.floor(viewport.width));
      canvas.height = Math.max(1, Math.floor(viewport.height));

      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, canvas.width, canvas.height);

      await page.render({
        canvasContext: context,
        viewport
      }).promise;

      return { canvas, viewport };
    }

    async function renderSpread(spreadNumber) {
      const key = `${state.layoutKey}:${spreadNumber}`;
      if (state.cache.has(key)) {
        bumpCacheKey(key);
        return state.cache.get(key);
      }

      const spread = state.spreads[spreadNumber - 1];
      if (!spread) {
        throw new Error("Разворот не найден");
      }

      const rect = stage.getBoundingClientRect();
      const maxWidth = Math.max(320, rect.width - 28);
      const maxHeight = Math.max(180, rect.height - 28);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      const leftPage = await state.pdf.getPage(spread[0]);
      const leftBase = leftPage.getViewport({ scale: 1 });

      let rightPage = null;
      let rightBase = null;
      if (!state.isSourceLandscape && spread[1]) {
        rightPage = await state.pdf.getPage(spread[1]);
        rightBase = rightPage.getViewport({ scale: 1 });
      }

      const baseLeftWidth = leftBase.width;
      const baseRightWidth = rightBase ? rightBase.width : (state.isSourceLandscape ? 0 : leftBase.width);
      const baseHeight = Math.max(leftBase.height, rightBase ? rightBase.height : leftBase.height);
      const baseSpreadWidth = baseLeftWidth + baseRightWidth;

      const fitScale = Math.min(maxWidth / baseSpreadWidth, maxHeight / baseHeight);
      const renderScale = fitScale * dpr;

      const leftRendered = await renderPdfPage(spread[0], renderScale);
      const rightRendered = rightPage
        ? await renderPdfPage(spread[1], renderScale)
        : null;

      const spreadCanvas = document.createElement("canvas");
      const spreadContext = spreadCanvas.getContext("2d", { alpha: false });

      const rightWidth = rightRendered
        ? rightRendered.canvas.width
        : (state.isSourceLandscape ? 0 : leftRendered.canvas.width);
      const spreadWidth = leftRendered.canvas.width + rightWidth;
      const spreadHeight = Math.max(
        leftRendered.canvas.height,
        rightRendered ? rightRendered.canvas.height : leftRendered.canvas.height
      );

      spreadCanvas.width = spreadWidth;
      spreadCanvas.height = spreadHeight;

      spreadContext.fillStyle = "#ffffff";
      spreadContext.fillRect(0, 0, spreadWidth, spreadHeight);
      spreadContext.drawImage(leftRendered.canvas, 0, 0);

      if (rightRendered) {
        spreadContext.drawImage(rightRendered.canvas, leftRendered.canvas.width, 0);
      } else if (!state.isSourceLandscape) {
        spreadContext.fillStyle = "#fdfdfd";
        spreadContext.fillRect(leftRendered.canvas.width, 0, rightWidth, spreadHeight);
      }

      if (!state.isSourceLandscape) {
        spreadContext.fillStyle = "rgba(0, 0, 0, 0.10)";
        spreadContext.fillRect(leftRendered.canvas.width - 1, 0, 2, spreadHeight);
      }

      spreadCanvas.dataset.dw = String(Math.round(spreadWidth / dpr));
      spreadCanvas.dataset.dh = String(Math.round(spreadHeight / dpr));

      state.cache.set(key, spreadCanvas);
      bumpCacheKey(key);
      trimCache();

      return spreadCanvas;
    }

    function updatePageInfo() {
      const total = state.spreads.length;
      const spread = state.spreads[state.currentSpread - 1] || [];
      const realPages = spread.filter(Boolean);

      if (realPages.length === 2) {
        pageInfo.textContent = `Разворот ${state.currentSpread} / ${total} · стр. ${realPages[0]}-${realPages[1]}`;
      } else if (realPages.length === 1) {
        pageInfo.textContent = `Разворот ${state.currentSpread} / ${total} · стр. ${realPages[0]}`;
      } else {
        pageInfo.textContent = `Разворот ${state.currentSpread} / ${total}`;
      }

      prevBtn.disabled = state.busy || state.currentSpread <= 1;
      nextBtn.disabled = state.busy || state.currentSpread >= total;
    }

    function waitForTransition(element, timeout = 360) {
      return new Promise((resolve) => {
        let done = false;

        function finish() {
          if (done) return;
          done = true;
          element.removeEventListener("transitionend", onEnd);
          resolve();
        }

        function onEnd(event) {
          if (event.target === element) {
            finish();
          }
        }

        element.addEventListener("transitionend", onEnd);
        setTimeout(finish, timeout);
      });
    }

    async function animateToSpread(renderedSpread, direction) {
      drawCanvas(incomingCanvas, renderedSpread);

      incomingSheet.style.transition = "none";
      currentSheet.style.transition = "none";

      incomingSheet.style.opacity = "1";
      incomingSheet.style.transform = `translateX(${direction > 0 ? 108 : -108}%)`;
      currentSheet.style.opacity = "1";
      currentSheet.style.transform = "translateX(0)";

      // Force reflow to apply start transforms before animation.
      stage.offsetHeight;

      incomingSheet.style.transition = "transform 0.28s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.22s ease";
      currentSheet.style.transition = "transform 0.28s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.22s ease";

      incomingSheet.style.transform = "translateX(0)";
      currentSheet.style.transform = `translateX(${direction > 0 ? -34 : 34}%)`;
      currentSheet.style.opacity = "0";

      await waitForTransition(incomingSheet);

      drawCanvas(currentCanvas, renderedSpread);

      incomingSheet.style.transition = "none";
      currentSheet.style.transition = "none";
      incomingSheet.style.opacity = "0";
      incomingSheet.style.transform = "translateX(0)";
      currentSheet.style.opacity = "1";
      currentSheet.style.transform = "translateX(0)";
    }

    async function openSpread(targetSpread, direction = 0, instant = false) {
      if (!state.pdf || targetSpread < 1 || targetSpread > state.spreads.length) {
        return;
      }

      if (state.busy) {
        state.queuedDelta = direction;
        return;
      }

      state.busy = true;
      updatePageInfo();
      clearError();

      try {
        setLoading(`Рисуем разворот ${targetSpread} из ${state.spreads.length}…`);
        const renderedSpread = await renderSpread(targetSpread);

        if (instant || direction === 0 || targetSpread === state.currentSpread) {
          drawCanvas(currentCanvas, renderedSpread);
        } else {
          await animateToSpread(renderedSpread, direction);
        }

        state.currentSpread = targetSpread;
        updatePageInfo();
        preloadNeighbors();
      } catch (err) {
        showError(`Не удалось открыть разворот: ${err.message}`);
      } finally {
        state.busy = false;
        updatePageInfo();

        const queued = state.queuedDelta;
        state.queuedDelta = 0;
        if (queued !== 0) {
          navigate(queued);
        }
      }
    }

    function navigate(delta) {
      const target = state.currentSpread + delta;
      if (target < 1 || target > state.spreads.length) {
        return;
      }
      openSpread(target, delta, false);
    }

    function preloadNeighbors() {
      const candidates = [state.currentSpread - 1, state.currentSpread + 1];
      for (const spreadNumber of candidates) {
        if (spreadNumber >= 1 && spreadNumber <= state.spreads.length) {
          renderSpread(spreadNumber).catch(() => {
            // Silent preload fail: user can still open spread directly.
          });
        }
      }
    }

    async function initializeReader() {
      const pdfPath = getPdfPath();
      const prettyName = pdfPath.replace(/^\.\//, "");
      setLoading(`Открываем ${prettyName}…`);

      const loadingTask = pdfjsLib.getDocument({
        url: pdfPath,
        cMapUrl: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/",
        cMapPacked: true
      });

      state.pdf = await loadingTask.promise;
      state.isSourceLandscape = await detectSpreadMode(state.pdf);
      state.spreads = buildSpreads(state.pdf.numPages, state.isSourceLandscape);
      state.currentSpread = 1;
      state.cache.clear();
      state.cacheOrder = [];
      state.layoutKey = getLayoutKey();

      updateOrientationUI();
      await openSpread(1, 0, true);

      loadingOverlay.style.opacity = "0";
      setTimeout(() => {
        loadingOverlay.hidden = true;
      }, 180);
    }

    let resizeTimer = null;
    function handleResize() {
      updateOrientationUI();

      if (!state.pdf) {
        return;
      }

      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(async () => {
        const newLayoutKey = getLayoutKey();
        if (newLayoutKey !== state.layoutKey) {
          state.layoutKey = newLayoutKey;
          state.cache.clear();
          state.cacheOrder = [];
          await openSpread(state.currentSpread, 0, true);
        }
      }, 180);
    }

    prevBtn.addEventListener("click", () => navigate(-1));
    nextBtn.addEventListener("click", () => navigate(1));

    let pointerStartX = 0;
    let pointerStartY = 0;
    let pointerActive = false;
    let pointerId = null;

    stage.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "mouse" && event.button !== 0) {
        return;
      }
      pointerActive = true;
      pointerId = event.pointerId;
      pointerStartX = event.clientX;
      pointerStartY = event.clientY;
      stage.setPointerCapture(event.pointerId);
    });

    stage.addEventListener("pointercancel", () => {
      pointerActive = false;
      pointerId = null;
    });

    stage.addEventListener("pointerup", (event) => {
      if (!pointerActive || event.pointerId !== pointerId) {
        return;
      }

      pointerActive = false;
      pointerId = null;

      if (state.busy) {
        return;
      }

      const dx = event.clientX - pointerStartX;
      const dy = event.clientY - pointerStartY;

      if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        navigate(dx < 0 ? 1 : -1);
        return;
      }

      const rect = stage.getBoundingClientRect();
      const localX = event.clientX - rect.left;
      if (localX > rect.width * 0.58) {
        navigate(1);
      } else if (localX < rect.width * 0.42) {
        navigate(-1);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        navigate(1);
      } else if (event.key === "ArrowLeft") {
        navigate(-1);
      }
    });

    window.addEventListener("resize", handleResize);
    window.addEventListener("orientationchange", handleResize);

    (async function bootstrap() {
      initTelegram();
      updateOrientationUI();
      try {
        await initializeReader();
      } catch (err) {
        loadingOverlay.hidden = true;
        showError(`Ошибка загрузки PDF: ${err.message}. Проверьте, что PDF лежит рядом с index.html (по умолчанию: book.pdf).`);
      }
    }());
  </script>
</body>
</html>
